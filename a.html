<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Our Telegram Channel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
width:100%;
background:#1e293b;
padding:35px 25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* TOP ICON */
.top-icon{
width:90px;
margin-bottom:15px;
}

/* CHANNEL NAME */
.channel-name{
  font-size:32px;
  font-weight:bold;
  background: linear-gradient(45deg, #d4af37, #b8860b); /* gradient gold */
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:12px;
}

/* TICK IMAGE */
.tick-img{
width:40px;
height:40px;
}

/* TRUSTED TEXT */
.trusted{
font-size:22px;
font-weight:bold;
color:#ff3b3b;
animation:redGlow 1.2s infinite;
margin-bottom:15px;
}

@keyframes redGlow{
0%{transform:scale(1); text-shadow:0 0 5px rgba(255,0,0,0.4);}
50%{transform:scale(1.05); text-shadow:0 0 18px rgba(255,0,0,0.9);}
100%{transform:scale(1); text-shadow:0 0 5px rgba(255,0,0,0.4);}
}

/* BLUE TEXT BELOW */
.sub-text{
font-size:18px;
color:#00c3ff;
animation:blueGlow 1.2s infinite;
margin-bottom:25px;
}

@keyframes blueGlow{
0%{transform:scale(1); text-shadow:0 0 5px rgba(0,195,255,0.4);}
50%{transform:scale(1.05); text-shadow:0 0 18px rgba(0,195,255,0.9);}
100%{transform:scale(1); text-shadow:0 0 5px rgba(0,195,255,0.4);}
}

/* BUTTON-STYLE POINTS */
.points{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:30px;
flex-wrap:wrap;
}

/* BUTTON-STYLE POINTS - smaller size */
.points div{
  flex:1 1 28%; /* slightly smaller width */
  background: linear-gradient(45deg, #22c55e, #16a34a); /* green gradient */
  padding:12px 8px; /* smaller padding */
  border-radius:8px;
  font-weight:bold;
  color:white;
  font-size:14px; /* smaller font */
  text-align:center;
  transition:all 0.3s ease;
  cursor:pointer;
}

/* Hover effect */
.points div:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px rgba(34,197,94,0.7);
}

/* MOBILE */
@media(max-width:500px){
  .channel-name{font-size:26px;}
  .trusted{font-size:18px;}
  .points div{
    flex:1 1 auto; /* allow inline wrap */
    font-size:13px;
    padding:10px 6px;
    margin-right:5px; /* space between inline boxes */
  }
  .points{
    flex-wrap:nowrap; /* keep inline in one row */
    overflow-x:auto; /* scroll if too wide */
    gap:5px;
  }
}
/* JOIN BUTTON */
.join-btn{
display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;
background:#00bfff;
color:white;
text-decoration:none;
padding:16px 28px;
font-size:20px;
border-radius:10px;
animation:btnPulse 1.2s infinite;
margin-bottom:10px;
}

@keyframes btnPulse{
0%{transform:scale(1); box-shadow:0 0 5px rgba(0,136,204,0.5);}
50%{transform:scale(1.07); box-shadow:0 0 18px rgba(0,136,204,0.9);}
100%{transform:scale(1); box-shadow:0 0 5px rgba(0,136,204,0.5);}
}

.join-btn img{
width:24px;
}

.note{
margin-top:10px;
font-size:14px;
color:#94a3b8;
}

/* MOBILE */
@media(max-width:500px){
.channel-name{font-size:26px;}
.trusted{font-size:18px;}
.points div{flex:1 1 100%; margin-bottom:10px;}
}

</style>

</head>
